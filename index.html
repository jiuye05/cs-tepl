<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS TEPL 对战平台 - 乌托邦同款</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei", sans-serif;}
body{background:#111217;color:#e0e0e0;padding:10px;}
.container{max-width:450px;margin:0 auto;}
.top-bar{
  background:#1a1c25;
  border-radius:10px;
  padding:12px 14px;
  text-align:center;
  margin-bottom:10px;
  border:1px solid #2c2f3a;
}
.top-bar h1{
  font-size:18px;
  color:#00ccff;
  font-weight:bold;
}
.top-bar p{
  font-size:12px;
  color:#888;
  margin-top:2px;
}
.box{
  background:#1a1c25;
  border:1px solid #2c2f3a;
  border-radius:10px;
  padding:12px;
  margin-bottom:8px;
}
.box .title{
  font-size:14px;
  color:#fff;
  margin-bottom:8px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:6px;
}
.box .title::before{
  content:"";
  width:3px;
  height:14px;
  background:#00ccff;
  border-radius:2px;
}
input,button{
  width:100%;
  padding:9px 10px;
  border-radius:6px;
  margin-bottom:6px;
  font-size:14px;
  border:none;
  outline:none;
}
input{
  background:#242732;
  color:#fff;
}
button{
  background:#007bff;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btn-red{background:#e63946;}
.btn-gray{background:#2d303d;color:#ccc;}
.btn-protest{background:#ff9800;color:#fff;}
.teams{
  display:flex;
  gap:6px;
}
.team{
  flex:1;
  background:#22252f;
  border-radius:8px;
  padding:8px;
}
.team h4{
  font-size:13px;
  color:#aaa;
  text-align:center;
  margin-bottom:6px;
}
.player{
  background:#2a2d38;
  padding:6px 8px;
  border-radius:4px;
  font-size:13px;
  margin-bottom:4px;
}
.room{
  background:#22252f;
  padding:10px;
  border-radius:8px;
  font-size:13px;
  line-height:1.5;
  margin-top:6px;
}
.room strong{color:#00ccff;}
.rank-item{
  display:flex;
  justify-content:space-between;
  padding:7px 9px;
  background:#242732;
  border-radius:6px;
  margin-bottom:5px;
  font-size:13px;
}
.rank-name{color:#e0e0e0;}
.rank-score{color:#00ccff;font-weight:bold;}
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  z-index:999;
}
.modal-box{
  background:#1a1c25;
  border:1px solid #2c2f3a;
  border-radius:10px;
  padding:18px;
  width:80%;max-width:320px;
}
.modal-box h3{
  font-size:15px;margin-bottom:10px;
}
.warn{
  color:#ff9800;font-size:13px;text-align:center;margin:6px 0;
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>CS TEPL 对战平台</h1>
    <p>对峙2专业匹配 | 乌托邦同款系统</p>
  </div>

  <div class="box">
    <div class="title">玩家信息</div>
    <div id="bindInfo" style="font-size:13px;margin-bottom:8px;color:#aaa;">未绑定ID</div>
    <input id="userID" placeholder="请输入对峙2游戏ID">
    <button onclick="bindID()">✅ 绑定/修改ID</button>
    <button onclick="joinQueue()">✅ 进入匹配</button>
    <button class="btn-gray" onclick="leaveQueue()">❌ 退出匹配</button>
  </div>

  <div class="box">
    <div class="title">匹配队列（满10人开赛）</div>
    <div class="teams">
      <div class="team">
        <h4>潜伏者 T</h4>
        <div id="listT"></div>
      </div>
      <div class="team">
        <h4>保卫者 CT</h4>
        <div id="listCT"></div>
      </div>
    </div>
    <input id="kickID" placeholder="输入要踢出的玩家ID" style="margin-top:8px">
    <button class="btn-red" onclick="openKickModal()">👮 管理员踢人</button>
  </div>

  <div class="box">
    <div class="title">比赛房间</div>
    <div id="roomInfo" class="room">等待匹配中...</div>
    <div id="protestArea" style="display:none;">
      <div class="warn">⚠️ 房主已判胜，可抗议（3人抗议即无效）</div>
      <button class="btn-protest" onclick="protestTest()">🚨 我要抗议</button>
    </div>
    <button onclick="startMatch()">🎮 开始比赛</button>
  </div>

  <div class="box">
    <div class="title">比赛结果</div>
    <button onclick="winT()">🔵 潜伏者 T 胜利</button>
    <button onclick="winCT()">🟢 保卫者 CT 胜利</button>
  </div>

  <div class="box">
    <div class="title">排行榜</div>
    <div id="rankList"></div>
    <button class="btn-red" onclick="openClearModal()">🧹 清空排行榜（管理）</button>
  </div>
</div>

<div id="clearModal" class="modal" style="display:none;">
  <div class="modal-box">
    <h3>管理员验证</h3>
    <input id="pwd1" type="password" placeholder="输入管理密码">
    <button onclick="doClear()">确认清空</button>
    <button class="btn-gray" onclick="closeClear()">取消</button>
  </div>
</div>

<div id="kickModal" class="modal" style="display:none;">
  <div class="modal-box">
    <h3>踢人验证</h3>
    <input id="pwd2" type="password" placeholder="输入管理密码">
    <button onclick="doKick()">确认踢人</button>
    <button class="btn-gray" onclick="closeKick()">取消</button>
  </div>
</div>

<script>
const BIN_ID = "69df8c84856a682189386098";
const API_KEY = "$2a$10$rw.Jgd7xEJmTN7m1ZgmNbusxBIlzr2St/3rR.Es4SvH/0PRGaJOpG";
const PASSWORD = "123456";
const MAP_POOL = ["Dust2","Inferno","Mirage","Nuke","Train","Cache","Overpass","Vertigo","Ancient","Office"];
const headers = { "X-Access-Key": API_KEY, "Content-Type": "application/json" };

function getBindData(){
  let data = JSON.parse(localStorage.getItem("bind_data") || '{"id":"","count":0,"month":'+new Date().getMonth()+'}');
  let nowMonth = new Date().getMonth();
  if(data.month !== nowMonth){ data.count=0; data.month=nowMonth; saveBindData(data); }
  return data;
}
function saveBindData(data){ localStorage.setItem("bind_data", JSON.stringify(data)); }

function bindID(){
  let d = getBindData();
  let input = document.getElementById("userID").value.trim();
  if(!input) return alert("请输入游戏ID！");
  if(d.count >=5) return alert("本月修改次数已用完！");
  d.id = input; d.count +=1; saveBindData(d); showBindInfo();
  alert("绑定成功！本月已修改："+d.count+"/5次");
}
function showBindInfo(){
  let d = getBindData();
  document.getElementById("bindInfo").innerText = d.id
    ? "已绑定："+d.id+" | 本月修改："+d.count+"/5"
    : "未绑定ID";
}

async function getData(){
  try{
    let res = await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID+"/latest",{headers});
    let json = await res.json();
    return json.record || {
      players:[], roomInfo:"等待匹配中...", rank:{},
      protest:0, protestUsers:[], timer:null, winner:null
    };
  }catch(e){
    return {players:[], roomInfo:"等待匹配中...", rank:{},protest:0,protestUsers:[],timer:null,winner:null};
  }
}
async function saveData(data){
  await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID,{method:"PUT",headers,body:JSON.stringify(data)});
  render();
}

async function protestTest(){
  let bd = getBindData();
  if(!bd.id) return alert("请先绑定ID！");
  let d = await getData();
  if(!d.winner) return alert("当前没有可抗议的结果！");
  if(d.protestUsers.includes(bd.id)) return alert("你已经抗议过了！");
  d.protest +=1;
  d.protestUsers.push(bd.id);
  await saveData(d);
  alert("抗议成功！当前："+d.protest+"/3人");

  if(d.protest >=3){
    d.roomInfo = "⚠️ 抗议成功，比赛结果无效！";
    d.winner = null; d.protest = 0; d.protestUsers = [];
    clearTimeout(d.timer); d.timer = null;
    await saveData(d);
    alert("比赛已重置，请重新开始！");
  }
}

async function win(side){
  let d = await getData();
  if(d.players.length<10) return alert("比赛尚未开始！");
  if(d.winner) return alert("已判胜，请等待抗议结束！");

  d.winner = side;
  d.protest = 0;
  d.protestUsers = [];
  d.roomInfo = `⏳ ${side}胜利（10秒内可抗议，3人抗议无效）`;
  document.getElementById("protestArea").style.display = "block";
  await saveData(d);
  alert(side+"方胜利已提交，进入抗议倒计时！");

  d.timer = setTimeout(async()=>{
    let d2 = await getData();
    if(!d2.winner || d2.protest >=3) return;

    if(d2.winner==="T") d2.players.slice(0,5).forEach(p=>d2.rank[p]=(d2.rank[p]||0)+10);
    if(d2.winner==="CT") d2.players.slice(5,10).forEach(p=>d2.rank[p]=(d2.rank[p]||0)+10);

    d2.roomInfo = "✅ "+d2.winner+"胜利（已生效）";
    d2.players = []; d2.winner = null; d2.protest = 0; d2.protestUsers = [];
    await saveData(d2);
    alert("比赛结束，胜利方已加分！");
  },10000);
  await saveData(d);
}

async function winT(){ win("T"); }
async function winCT(){ win("CT"); }

async function render(){
  showBindInfo();
  let d = await getData();
  let listT = document.getElementById("listT"), listCT = document.getElementById("listCT");
  listT.innerHTML = ""; listCT.innerHTML = "";
  d.players.forEach((p,i)=>{
    let item = document.createElement("div");
    item.className = "player";
    item.innerText = p;
    i<5 ? listT.appendChild(item) : listCT.appendChild(item);
  });
  document.getElementById("roomInfo").innerHTML = d.roomInfo;
  document.getElementById("protestArea").style.display = d.winner ? "block" : "none";
  renderRank();
}
async function renderRank(){
  let d = await getData();
  let r = document.getElementById("rankList");
  r.innerHTML = "";
  Object.entries(d.rank).sort((a,b)=>b[1]-a[1]).forEach(([n,s],i)=>{
    let div = document.createElement("div");
    div.className = "rank-item";
    div.innerHTML = `<span class='rank-name'>${i+1}. ${n}</span><span class='rank-score'>${s}分</span>`;
    r.appendChild(div);
  });
}

async function joinQueue(){
  let bd = getBindData();
  if(!bd.id) return alert("请先绑定游戏ID！");
  let d = await getData();
  if(d.players.includes(bd.id)) return alert("你已在匹配队列中！");
  if(d.players.length>=10) return alert("队列已满，请等待下一局！");
  d.players.push(bd.id);
  await saveData(d);
  alert("进入匹配成功！");
}
async function leaveQueue(){
  let bd = getBindData();
  if(!bd.id) return alert("请先绑定游戏ID！");
  let d = await getData();
  d.players = d.players.filter(x=>x!==bd.id);
  await saveData(d);
  alert("退出匹配成功！");
}

async function startMatch(){
  let d = await getData();
  if(d.players.length < 10) return alert("需要10人才能开始比赛！");
  let map = MAP_POOL[Math.floor(Math.random()*MAP_POOL.length)];
  let room = "TEPL-"+Math.floor(1000+Math.random()*9000);
  let pwd = Math.floor(100000+Math.random()*900000);
  d.roomInfo = `<strong>房间：${room}</strong><br>密码：${pwd}<br>地图：${map}<br>5v5竞技`;
  await saveData(d);
  alert("比赛开始！房间已生成！");
}

function openClearModal(){alert("请输入管理员密码！");document.getElementById("clearModal").style.display="flex"}
function closeClear(){document.getElementById("clearModal").style.display="none"}
async function doClear(){
  if(document.getElementById("pwd1").value!==PASSWORD) return alert("密码错误！");
  let d=await getData(); d.rank={}; await saveData(d);
  alert("排行榜已清空！"); closeClear();
}

function openKickModal(){alert("请输入管理员密码！");document.getElementById("kickModal").style.display="flex"}
function closeKick(){document.getElementById("kickModal").style.display="none"}
async function doKick(){
  let kid=document.getElementById("kickID").value.trim();
  if(document.getElementById("pwd2").value!==PASSWORD) return alert("密码错误！");
  if(!kid) return alert("请输入要踢的玩家ID！");
  let d=await getData(); d.players=d.players.filter(x=>x!==kid);
  await saveData(d); alert("已踢出该玩家！"); closeKick();
}

setInterval(render,2000);
render();
</script>
</body>
</html>
